<section id="banner" class="post-banner gutter {{ if featured_image }}has-image{{ /if }}">

	<div class="frame inner">
		<h1>{{ title }}</h1>
		{{ if author }}
		<div class="card row row-v mar-t">
			{{ relate:author }}
			<div class="">
				<img src="{{ email | gravatar or profile_pic }}" alt="{{ name }}">
			</div>
			<div class="mar-l">
				<span>{{ name }}</span>
			</div>
			{{ /relate:author }}
		</div>
		{{ /if }}
		{{ if intro }}
		<div class="markdown mar-t">
			{{ intro }}
		</div>
		{{ /if }}
	</div>

	{{ if featured_image }}
	<div class="wrapper">
		<div class="bg-img bg-ultra-wide" style="background-image: url('{{ featured_image }}');"></div>
	</div> <!-- END banner__image -->
	{{ /if }}
	
</section> <!-- END banner -->
