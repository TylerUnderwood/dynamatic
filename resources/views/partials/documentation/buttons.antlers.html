<div class="block">
	
	<h3 class="mar-b-4 text-center">Button Types</h3>

	<div class="masonry grout-2 text-center">
		<div class="tile tile-12 sm:tile-6 sm:text-right">
			<button class="btn btn--phat">
				<span class="btn__text meta">Phat</span>
			</button>
		</div>
		<div class="tile tile-12 sm:tile-6 sm:text-left">
			<button class="btn btn--phat btn--border">
				<span class="btn__text meta">Phat</span>
			</button>
		</div>
		<div class="tile tile-12 sm:tile-6 sm:text-right">
			<button class="btn">
				<span class="btn__text meta">Normal</span>
			</button>
		</div>
		<div class="tile tile-12 sm:tile-6 sm:text-left">
			<button class="btn btn--border">
				<span class="btn__text meta">Border</span>
			</button>
		</div>
		<div class="tile tile-12 sm:tile-6 sm:text-right">
			<button class="btn btn--stout">
				<span class="btn__text meta">Stout</span>
			</button>
		</div>
		<div class="tile tile-12 sm:tile-6 sm:text-left">
			<button class="btn btn--stout btn--border">
				<span class="btn__text meta">Stout</span>
			</button>
		</div>
		<div class="tile tile-12 sm:tile-6 sm:text-right">
			<button class="btn btn--slim">
				<span class="btn__text meta">Slim</span>
			</button>
		</div>
		<div class="tile tile-12 sm:tile-6 sm:text-left">
			<button class="btn btn--slim btn--border">
				<span class="btn__text meta">Slim</span>
			</button>
		</div>
	</div>

	<h3 class="mar-t-5 mar-b-4 text-center">Buttons With Icons</h3>

	<div class="masonry grout-2 text-center">
		<div class="tile tile-12 sm:tile-6 sm:text-right">
			<button class="btn btn--phat">
				<span class="btn__text meta">Phat</span>
				<i class="btn__text mar-l-2 fa fa-chevron-right" aria-hidden="true"></i>
			</button>
		</div>
		<div class="tile tile-12 sm:tile-6 sm:text-left">
			<button class="btn btn--phat btn--border">
				<span class="btn__text meta">Phat</span>
				<i class="btn__text mar-l-2 fa fa-chevron-right" aria-hidden="true"></i>
			</button>
		</div>
		<div class="tile tile-12 sm:tile-6 sm:text-right">
			<button class="btn">
				<span class="btn__text meta">Normal</span>
				<i class="btn__text mar-l-2 fa fa-caret-right" aria-hidden="true"></i>
			</button>
		</div>
		<div class="tile tile-12 sm:tile-6 sm:text-left">
			<button class="btn btn--border">
				<span class="btn__text meta">Border</span>
				<i class="btn__text mar-l-2 fa fa-caret-right" aria-hidden="true"></i>
			</button>
		</div>
		<div class="tile tile-12 sm:tile-6 sm:text-right">
			<button class="btn btn--slim">
				<span class="btn__text meta">Slim</span>
				<i class="btn__text mar-l-2 fa fa-angle-right" aria-hidden="true"></i>
			</button>
		</div>
		<div class="tile tile-12 sm:tile-6 sm:text-left">
			<button class="btn btn--slim btn--border">
				<span class="btn__text meta">Slim</span>
				<i class="btn__text mar-l-2 fa fa-angle-right" aria-hidden="true"></i>
			</button>
		</div>
		<div class="tile tile-12 sm:tile-6 sm:text-right">
			<button class="btn btn--square">
				<i class="btn__icon fa fa-plus"></i>
			</button>
		</div>
		<div class="tile tile-12 sm:tile-6 sm:text-left">
			<button class="btn btn--square btn--border">
				<i class="btn__icon fa fa-plus"></i>
			</button>
		</div>
	</div>

</div>
