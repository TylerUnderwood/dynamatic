---
colors:
  - primary
  - accent
  - link-hover
  - link-active
  - text-color
  - background-color
  - contrast
  - border-color
---

<div class="block frame mar-t-0">
  <div class="masonry grout-2xs">
  {{ view:colors }}

    <div class="tile">
      <a class="btn btn--slim btn--stout btn--border" href="#{{ value }}">
        <span class="btn__text meta">{{ value }}</span>
      </a>
    </div>

  {{ /view:colors }}
  </div>
</div>

<div class="masonry grout-xs">
  {{ view:colors }}

  <div class="column tile tile-6 sm:tile-4 lg:tile-3">
    {{ partial src="_swatch_card" value="{{ value }}" }}
  </div>

  {{ /view:colors }}
</div>
