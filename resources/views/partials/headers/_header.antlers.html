<header id="header" class="header">
	<div class="header__inner outer">

	<a id="logo" class="header__logo logo" href="/" title="{{ site:name }} | Home">
		{{ theme:output src="svg/saturn-logo.svg" }}
	</a> <!-- END header__logo -->

	<div class="filler"></div>

	<nav class="header__nav nav hide md:show">
	{{ nav:header }}

		<a class="nav__link link stealth-link" href="{{ url }}">
			<span class="meta">{{ title }}</span>
		</a>
		
	{{ /nav:header }}
	</nav> <!-- END header__nav -->

	<div class="mar-l hide md:show">
		<a href="/documentation" class="btn btn--stout">
			<span class="meta">Docs</span>
		</a>
	</div>
	
	<button class="menu-button md:hide" toggle="menu">
		<span class="menu-button__bar"></span>
		<span class="menu-button__bar"></span>
		<span class="menu-button__bar"></span>
	</button> <!-- END menu-button -->
	
	<div id="menu" class="menu gutter js--modal">
		<div class="menu__inner wrapper">
			<nav class="menu__nav">
			{{ nav }}

				<span class="h3 text-color">
					<a class="menu__link link stealth-link" href="{{ url }}">
						{{ title }}
					</a>
				</span>
					
			{{ /nav }}
			</nav>
			<div class="gap-6"></div>
			<div class="menu__nav large">
				{{ if site:phone }}
				<a class="menu__link link stealth-link" disabled href="tel:{{ site:phone }}">
					<span class="icon">{{ theme:output src="svg/icon-hashtag.svg" }}</span>
					<span class="meta">Call us</span>
				</a>
				{{ /if }}
	
				{{ if site:email }}
				<a class="menu__link link stealth-link" href="mailto:{{ site:email }}">
					<span class="icon">{{ theme:output src="svg/icon-at.svg" }}</span>
					<span class="meta">Email us</span>
				</a>
				{{ /if }}
				</div>
		</div>
	</div> <!-- END menu -->

	</div> <!-- END header__inner -->
</header> <!-- END #header -->
