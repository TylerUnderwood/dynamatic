<div 
  id="{{ value }}" 
  class="card fill border-b-r"
  style="border-top-left-radius: 1rem"
>
  <a 
    class="bg-img bg-square"
    style="
      background-color: var(--{{ value }});
      border-bottom-right-radius: 1rem;
    "
    href="#{{ value }}"
  ></a>
  <div class="column column-l pad relative">
    <div 
      class="arch arch--t-l inset-t-l" 
      style="
        font-size: 1rem;
        color: var(--{{ value }})
      "
    ></div>
    <span class="meta small letter-space-0" display-var="--{{ value }}"></span>
    <div class="spacer size-2xs"></div>
    <code class="code small">{{ value }}</code>
  </div>
</div>
