<nav class="nav nav--v">
{{ nav:documentation }}
  <div class="col col-l">

    <a class="nav__link link" href="{{ url }}">
      <span class="meta">{{ title }}</span>
    </a>

    {{ children }}
      <a class="nav__link link mar-l" href="{{ url }}">
        <span class="meta">{{ title }}</span>
      </a>
    {{ /children }}

  </div>

  {{ if not last }}
  <hr class="break" />
  {{ /if }}
{{ /nav:documentation }}
</nav>
